server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: campushub
  profiles:
    default: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

campushub:
  jwt:
    issuer: ${CAMPUSHUB_JWT_ISSUER:campushub-local}
    secret: ${CAMPUSHUB_JWT_SECRET:campushub-local-development-secret-with-enough-length}
    expiration-minutes: ${CAMPUSHUB_JWT_EXPIRATION_MINUTES:43200}
  beta:
    demo-reset-enabled: ${CAMPUSHUB_BETA_DEMO_RESET_ENABLED:false}
    student:
      email: ${CAMPUSHUB_BETA_STUDENT_EMAIL:}
      username: ${CAMPUSHUB_BETA_STUDENT_USERNAME:}
      password: ${CAMPUSHUB_BETA_STUDENT_PASSWORD:}
      student-no: ${CAMPUSHUB_BETA_STUDENT_NO:}
      real-name: ${CAMPUSHUB_BETA_STUDENT_REAL_NAME:Beta Student}
      nickname: ${CAMPUSHUB_BETA_STUDENT_NICKNAME:Beta Student}
      phone: ${CAMPUSHUB_BETA_STUDENT_PHONE:}
      wechat-contact: ${CAMPUSHUB_BETA_STUDENT_WECHAT:}
      qq-contact: ${CAMPUSHUB_BETA_STUDENT_QQ:}
    admin:
      email: ${CAMPUSHUB_BETA_ADMIN_EMAIL:}
      username: ${CAMPUSHUB_BETA_ADMIN_USERNAME:}
      password: ${CAMPUSHUB_BETA_ADMIN_PASSWORD:}
      student-no: ${CAMPUSHUB_BETA_ADMIN_STUDENT_NO:}
      real-name: ${CAMPUSHUB_BETA_ADMIN_REAL_NAME:Beta Admin}
      nickname: ${CAMPUSHUB_BETA_ADMIN_NICKNAME:Beta Admin}
      phone: ${CAMPUSHUB_BETA_ADMIN_PHONE:}
      wechat-contact: ${CAMPUSHUB_BETA_ADMIN_WECHAT:}
      qq-contact: ${CAMPUSHUB_BETA_ADMIN_QQ:}
  file-storage:
    root: ${CAMPUSHUB_FILE_ROOT:./data/uploads}
  payment:
    provider: ${CAMPUSHUB_PAYMENT_PROVIDER:mock}
    center:
      base-url: ${CAMPUSHUB_PAYMENT_CENTER_BASE_URL:}
      create-path: ${CAMPUSHUB_PAYMENT_CENTER_CREATE_PATH:}
      callback-url: ${CAMPUSHUB_PAYMENT_CENTER_CALLBACK_URL:http://localhost:8080/api/payment/callbacks/payment-center}
      callback-token: ${CAMPUSHUB_PAYMENT_CENTER_CALLBACK_TOKEN:}
      signing-secret: ${CAMPUSHUB_PAYMENT_CENTER_SIGNING_SECRET:}
      expire-minutes: ${CAMPUSHUB_PAYMENT_ORDER_EXPIRE_MINUTES:30}
  secondhand:
    service-fee:
      enabled: ${CAMPUSHUB_SECONDHAND_SERVICE_FEE_ENABLED:false}
      intent-amount: ${CAMPUSHUB_SECONDHAND_SERVICE_FEE_INTENT_AMOUNT:0.00}
  wallet:
    recharge:
      wechat:
        manual-qr-url: ${CAMPUSHUB_WECHAT_MANUAL_QR_URL:}
        manual-note: ${CAMPUSHUB_WECHAT_MANUAL_NOTE:扫码支付后请备注你的校园邮箱或 CampusHub 用户名，管理员审核后入账。}
  mail:
    enabled: ${CAMPUSHUB_MAIL_ENABLED:false}
    provider: ${CAMPUSHUB_MAIL_PROVIDER:mock}
    smtp:
      host: ${CAMPUSHUB_MAIL_SMTP_HOST:localhost}
      port: ${CAMPUSHUB_MAIL_SMTP_PORT:587}
      username: ${CAMPUSHUB_MAIL_SMTP_USERNAME:}
      password: ${CAMPUSHUB_MAIL_SMTP_PASSWORD:}
      from: ${CAMPUSHUB_MAIL_FROM:no-reply@localhost}
      from-name: ${CAMPUSHUB_MAIL_FROM_NAME:USTC CampusHub}
    code:
      ttl-minutes: ${CAMPUSHUB_MAIL_CODE_TTL_MINUTES:10}
      resend-seconds: ${CAMPUSHUB_MAIL_CODE_RESEND_SECONDS:60}
