server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: campushub
  profiles:
    default: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

campushub:
  jwt:
    issuer: ${CAMPUSHUB_JWT_ISSUER:campushub-local}
    secret: ${CAMPUSHUB_JWT_SECRET:campushub-local-development-secret-with-enough-length}
    expiration-minutes: ${CAMPUSHUB_JWT_EXPIRATION_MINUTES:720}
  file-storage:
    root: ${CAMPUSHUB_FILE_ROOT:./data/uploads}
  payment:
    provider: ${CAMPUSHUB_PAYMENT_PROVIDER:mock}
    center:
      base-url: ${CAMPUSHUB_PAYMENT_CENTER_BASE_URL:}
      create-path: ${CAMPUSHUB_PAYMENT_CENTER_CREATE_PATH:}
      callback-url: ${CAMPUSHUB_PAYMENT_CENTER_CALLBACK_URL:http://localhost:8080/api/payment/callbacks/payment-center}
      callback-token: ${CAMPUSHUB_PAYMENT_CENTER_CALLBACK_TOKEN:}
      signing-secret: ${CAMPUSHUB_PAYMENT_CENTER_SIGNING_SECRET:}
      expire-minutes: ${CAMPUSHUB_PAYMENT_ORDER_EXPIRE_MINUTES:30}
  secondhand:
    service-fee:
      enabled: ${CAMPUSHUB_SECONDHAND_SERVICE_FEE_ENABLED:false}
      intent-amount: ${CAMPUSHUB_SECONDHAND_SERVICE_FEE_INTENT_AMOUNT:0.00}
  mail:
    enabled: ${CAMPUSHUB_MAIL_ENABLED:false}
    provider: ${CAMPUSHUB_MAIL_PROVIDER:mock}
    smtp:
      host: ${CAMPUSHUB_MAIL_SMTP_HOST:localhost}
      port: ${CAMPUSHUB_MAIL_SMTP_PORT:587}
      username: ${CAMPUSHUB_MAIL_SMTP_USERNAME:}
      password: ${CAMPUSHUB_MAIL_SMTP_PASSWORD:}
      from: ${CAMPUSHUB_MAIL_FROM:no-reply@localhost}
      from-name: ${CAMPUSHUB_MAIL_FROM_NAME:CampusHub}
    code:
      ttl-minutes: ${CAMPUSHUB_MAIL_CODE_TTL_MINUTES:10}
      resend-seconds: ${CAMPUSHUB_MAIL_CODE_RESEND_SECONDS:60}
