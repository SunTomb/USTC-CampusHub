spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/campushub?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:campushub}
    password: ${SPRING_DATASOURCE_PASSWORD:campushub-local-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false

logging:
  level:
    com.campushub: info
