spring:
  datasource:
    url: jdbc:h2:mem:campushub-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  flyway:
    locations: classpath:db/test-migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.campushub: info
